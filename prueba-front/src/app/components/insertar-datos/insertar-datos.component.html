<div class="card shadow-sm mb-4">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Registrar Nuevo Documento</h5>
  </div>

  <div class="card-body">
    <form (ngSubmit)="enviarFormulario()" #formDoc="ngForm">

      <div class="row g-3">

        <!-- ID Documento -->
        <div class="col-md-4">
          <label class="form-label fw-bold">ID Documento</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="nuevoDocumento.id_documento"
            name="id_documento"
            placeholder="Ej: 12"
            required>
        </div>

        <!-- Aplica Retención -->
        <div class="col-md-4">
          <label class="form-label fw-bold">Aplica Retención</label>
          <select
            class="form-control"
            [(ngModel)]="nuevoDocumento.aplica_retencion"
            name="aplica_retencion"
            required>
            <option [ngValue]="null">Seleccione</option>
            <option [ngValue]="1">Sí</option>
            <option [ngValue]="0">No</option>
          </select>
        </div>

        <!-- Valor Base -->
        <div class="col-md-4">
          <label class="form-label fw-bold">Valor Base</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="nuevoDocumento.valor_base"
            name="valor_base"
            placeholder="Ej: 250000"
            required>
        </div>

      </div>

      <div class="mt-3 text-end">
        <button type="button" class="btn btn-secondary me-2" (click)="limpiarFormulario()">
          Limpiar
        </button>

        <button type="submit" class="btn btn-success" [disabled]="!formDoc.valid">
          Guardar 
        </button>
      </div>

    </form>
  </div>
</div>
