<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba Crionyx</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .aplica { background-color: #d4edda; font-weight: bold; } /* Resaltado verde */
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Automatización Contable Crionyx</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Proveedor</th>
                    <th>Total</th>
                    <th>Retención</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
        </table>
    </div>

    <script>
        async function cargar() {
            const res = await fetch('../index.php?action=listar');
            const data = await res.json();
            const body = document.getElementById('tabla-body');
            body.innerHTML = data.map(doc => `
                <tr class="${doc.aplica_retencion ? 'aplica' : ''}">
                    <td>${doc.id}</td>
                    <td>${doc.proveedor}</td>
                    <td>$${doc.valor_total.toLocaleString()}</td>
                    <td>${doc.aplica_retencion ? 'SÍ' : 'NO'}</td>
                    <td><button onclick="guardar(${doc.id}, ${doc.aplica_retencion})">Guardar</button></td>
                </tr>
            `).join('');
        }

        async function guardar(id, aplica) {
            const res = await fetch('../index.php?action=procesar', {
                method: 'POST',
                body: JSON.stringify({ documento_id: id, aplica_retencion: aplica })
            });
            const result = await res.json();
            if(result.status === 'success') alert('Procesado con éxito');
        }

        cargar();
    </script>
</body>
</html>
